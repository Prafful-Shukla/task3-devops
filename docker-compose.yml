version: '3.8'

services:

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-1}
      SECRET_ID: ${SECRET_ID:-task3/rds/postgres}
    restart: always

  frontend:
    build: ./frontend
    container_name: frontend
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always
